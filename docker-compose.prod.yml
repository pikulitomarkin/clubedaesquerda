# Stack de produção da VPS (4 vCPU / 5.8 GB + 2 GB de swap, IP público próprio).
#
# As imagens NÃO são construídas aqui: o GitHub Actions builda e publica no
# GHCR, e esta máquina só faz `pull`. Manter o build fora da VPS deixa o
# deploy rápido e reproduzível, e a VPS só executa.
#
# TLS é terminado pelo Caddy (Let's Encrypt automático) — a VPS tem IP
# público na própria interface, então 80/443 chegam direto e não há Cloudflare
# Tunnel no caminho. Aponte um registro A de ${DOMAIN} e ${API_DOMAIN} para o
# IP da VPS.
name: clube

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Tuning coerente com ~5.8 GB de RAM na máquina.
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=1536MB
      -c work_mem=8MB
      -c maintenance_work_mem=128MB
      -c max_connections=80
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [clube]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Só é usado como pub/sub de WebSocket entre instâncias (contexto.md
    # §3.3) — não guarda estado durável, então pode descartar sob pressão.
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [clube]

  api:
    image: ghcr.io/${GHCR_OWNER}/clube-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      WEB_ORIGIN: ${WEB_ORIGIN}
      API_PUBLIC_URL: ${API_PUBLIC_URL}
      CPF_PEPPER: ${CPF_PEPPER}
      JWT_ACCESS_PRIVATE_KEY: ${JWT_ACCESS_PRIVATE_KEY}
      JWT_ACCESS_PUBLIC_KEY: ${JWT_ACCESS_PUBLIC_KEY}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      TENOR_API_KEY: ${TENOR_API_KEY}
    volumes:
      # Uploads precisam sobreviver à recriação do container.
      - uploads:/app/apps/api/uploads
    networks: [clube]

  web:
    image: ghcr.io/${GHCR_OWNER}/clube-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on: [api]
    environment:
      NODE_ENV: production
      PORT: 3000
    networks: [clube]

  # Reverse proxy + TLS. Caddy emite e renova certificados Let's Encrypt
  # sozinho a partir dos domínios do Caddyfile. É o ÚNICO serviço que publica
  # portas no host — todo o resto fica só na rede interna `clube`.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [web, api]
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [clube]

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:

networks:
  clube:
    driver: bridge
