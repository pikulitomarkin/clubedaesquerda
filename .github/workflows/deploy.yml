name: Deploy produção

# Push em `main` = produção (metodologia Vintage DevStack, seção 7).
# Também pode ser disparado manualmente pela aba Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Dois deploys simultâneos na mesma VPS deixariam os containers em estado
  # inconsistente. Nunca cancela o que já está rodando — só enfileira.
  group: deploy-producao
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  # Build acontece AQUI, não na VPS: ela tem 1 vCPU e 961 MB e levaria
  # dezenas de minutos em swap, com risco de OOM. A VPS só faz `pull`.
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push da API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/clube-api:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/clube-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push do web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          # NEXT_PUBLIC_* entra no bundle em tempo de build, não em runtime.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/clube-web:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/clube-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Enviar compose para a VPS
        run: |
          scp -i ~/.ssh/id_ed25519 -P ${{ secrets.VPS_PORT }} \
            docker-compose.prod.yml \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/clube/docker-compose.yml

      - name: Aplicar migrations e subir a stack
        run: |
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "IMAGE_TAG=${{ github.sha }} GHCR_OWNER=${{ github.repository_owner }} bash /opt/clube/deploy.sh"
